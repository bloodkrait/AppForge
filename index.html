      maxTokens = maxTokens || 1200;
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{ "Content-Type":"application/json", "x-api-key":getKey(), "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-access":"true" },
        body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:maxTokens, system:system, messages:[{role:"user",content:user}] })
      });

    ];


    function parseIdeas(text) {
      const blocks = text.split(/\n(?=(?:#{1,3}|\*\*)?(?:Idea |App |\d+[.)]) )/i).filter(function(b){return b.trim().length>40;});
      if(blocks.length<2) return [{title:"App Concept",tagline:"",body:text,gap:"",effort:"Low",revenue:"$1K-5K/mo",time:"2-4 weeks",id:Date.now()}];
      return blocks.slice(0,4).map(function(block){
        const lines=block.trim().split("\n").filter(Boolean);
        const titleLine=lines[0].replace(/^[#*\d.)]+\s*/,"").replace(/\*\*/g,"").trim();
        const parts = titleLine.split("\u2014").map(function(s){return s.trim();});
        const title = parts[0];
        const tagline = parts[1]||"";
        const body=lines.slice(1).join("\n").replace(/\*\*/g,"").trim();
        const gapMatch = body.match(/Gap Opportunity[:\s]+([\s\S]+?)(?=\n\*\*|\n##|$)/i);
        const gap = gapMatch ? gapMatch[1].trim() : "";
        const effortM=body.match(/effort[:\s]+(\w+)/i);
        const revM=body.match(/\$([\d,KkMm\u2013-]+\/mo[nth]*)/i);
        const timeM=body.match(/(\d+[-\u2013]\d+\s*(?:days?|weeks?|months?))/i);
        return {
          id:Date.now()+Math.random(),
          title:title,tagline:tagline,body:body,gap:gap,
          effort:effortM?effortM[1]:"Low",
          revenue:revM?"$"+revM[1]:"Varies",
          time:timeM?timeM[1]:"2-4 wks"
        };
      });
    }

    function exportBrief(idea, extras) {

        setCmpLoading(false);
      };

          } else if(sectionId==="mvp"){

                      <div className="stepper">
                        {["Planning","Building","Launched"].map(s=>(
                          <button key={s} className={`step ${projStatus===s?"on":""}`} onClick={()=>updateStatus(s)}>{s}</button>
                        ))}
                      </div>
                      <div className="proj-hero-actions">
                        <button className="abtn blue" onClick={()=>exportBrief(activeProject,{})}>↓ Export Brief</button>
                        <button className="abtn" style={{color:"var(--red)",borderColor:"rgba(255,82,82,.2)"}} onClick={clearProject}>✕ Clear</button>
                      </div>
                    </div>
                    {projFocus&&(
                      <div className="focus-card">
                        <div className="focus-label">🎯 This week's one thing</div>
                        <div className="focus-text">{projFocus}</div>
                      </div>
                    )}
                    <div className="proj-sections">
                      {PROJECT_SECTIONS.map(function(sec){
                        const s=projSections[sec.id];
                        const isOpen=s&&s.open;
                        const hasContent=!!(s&&s.content);
                        return (
                          <div key={sec.id} className="psec">
                            <div className="psec-hdr" onClick={()=>hasContent&&toggleSection(sec.id)}>
                              <div style={{display:"flex",alignItems:"center"}}>
                                <span className="psec-icon">{sec.icon}</span>
                                <span className="psec-title">{sec.title}</span>
                              </div>
                              {hasContent&&<span className={`psec-chevron ${isOpen?"open":""}`}>▼</span>}
                            </div>
                            {s&&s.loading&&<div className="psec-loading"><span className="dot">Generating {sec.title}</span></div>}
                            {hasContent&&isOpen&&(
                              <>
                                <div className="psec-body">{s.content}</div>
                                {sec.id==="spec"&&(
                                  <div style={{padding:".6rem 1.2rem",borderTop:"1px solid var(--b)",display:"flex",gap:".5rem",alignItems:"center",background:"rgba(0,0,0,.15)"}}>
                                    <button className="gen-btn-sm" onClick={function(){
                                      navigator.clipboard.writeText(s.content).then(function(){
                                        setProjSections(function(prev){return {...prev,spec:{...prev.spec,copied:true}};});
                                        setTimeout(function(){setProjSections(function(prev){return {...prev,spec:{...prev.spec,copied:false}};});},2000);
                                      });
                                    }}>{projSections.spec&&projSections.spec.copied?"✓ Copied!":"📋 Copy Prompt"}</button>
                                    <span style={{fontSize:".72rem",color:"var(--mut)"}}>Paste into a new Claude chat to start building</span>
                                  </div>
                                )}
                                {sec.id==="money"&&(function(){
                                  const items=["Set up Stripe account","Create product + price in Stripe","Get a Stripe payment link","Build a one-page landing page","Write the headline copy","Add payment link to page","Share with 5 potential users","Make first sale"];
                                  return (
                                    <div className="checklist">
                                      {items.map(function(item,i){
                                        const key="money-"+i;
                                        return (
                                          <div key={i} className="check-item" onClick={()=>toggleCheck(key)}>
                                            <div className={`check-box ${projChecks[key]?"done":""}`}>{projChecks[key]?"✓":""}</div>
                                            <div className={`check-text ${projChecks[key]?"done":""}`}>{item}</div>
                                          </div>
                                        );
                                      })}
                                    </div>
                                  );
                                })()}
                              </>
                            )}
                            {!hasContent&&!(s&&s.loading)&&(
                              <div className="psec-gen">
                                <span className="psec-gen-text">{sec.label}</span>
                                <button className="gen-btn-sm" onClick={()=>genSection(sec.id)}>Generate</button>
                              </div>
                            )}
                            {hasContent&&!isOpen&&(
                              <div className="psec-gen">
                                <span className="psec-gen-text">Generated — tap to expand</span>
                                <button className="gen-btn-sm" onClick={()=>genSection(sec.id)}>Regenerate</button>
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </>
                }
              </div>
            )}

            {cmpResult&&(
              <div className="overlay" onClick={()=>setCmpResult(null)}>
                <div className="modal" onClick={e=>e.stopPropagation()}>
                  <div style={{fontFamily:"var(--mono)",fontSize:".6rem",color:"var(--mut)",textTransform:"uppercase",letterSpacing:".1em",marginBottom:".4rem"}}>Head-to-Head</div>
                  <h2>{cmpResult.a} vs {cmpResult.b}</h2>
                  <div className="sub">Which to build first</div>
                  {cmpLoading
                    ?<div className="loading-line"><span className="dot">Comparing</span></div>
                    :<div className="modal-body">{cmpResult.content}</div>}
                  <button className="modal-close" onClick={()=>setCmpResult(null)}>Close</button>
                </div>
              </div>
            )}
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<AppForge />);
  </script>
</body>
</html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AppForge</title>

  <!-- React + Babel (no build step needed) -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d0d; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ── API ───────────────────────────────────────────────────────────────────
    async function callClaude(system, user, maxTokens = 1200) {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": localStorage.getItem("af_apikey") || "",
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: maxTokens,
          system,
          messages: [{ role: "user", content: user }],
        }),
      });
      const d = await res.json();
      if (d.error) throw new Error(d.error.message);
      return d.content.map(b => b.text || "").join("\n");
    }

    // ── STORAGE (localStorage for standalone) ────────────────────────────────
    function loadStorage(key) {
      try { const v = localStorage.getItem("af_" + key); return v ? JSON.parse(v) : null; } catch { return null; }
    }
    function saveStorage(key, val) {
      try { localStorage.setItem("af_" + key, JSON.stringify(val)); } catch {}
    }

    // ── STYLES ────────────────────────────────────────────────────────────────
    const S = `
@import url('https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;700;800;900&family=Chivo+Mono:wght@300;400;500&display=swap');

  --red:#ff5252;--gold:#f5b700;--blue:#4d9fff;--purple:#b27eff;--teal:#2dd4bf;

}
html,body{background:var(--bg);color:var(--text);font-family:var(--head);}
.app{min-height:100vh;}
.nav{display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.5rem;border-bottom:1px solid var(--b);background:var(--s1);position:sticky;top:0;z-index:10;}
.logo{font-size:1.25rem;font-weight:900;letter-spacing:-.04em;color:#fff;}

.tab.on{background:var(--s2);color:var(--text);}

    `;

    // ── CONSTANTS ──────────────────────────────────────────────────────────────
    const NICHES = ["AI tools","Productivity","Finance","Fitness","Real Estate","Food","Pets","Gaming","Beauty","Home","Travel","Freelancers"];
    const MONETIZE = ["Subscription","One-Time","Freemium","Marketplace","Ads"];
    const SKILLS = ["Vibe coding (AI)","Some coding","Basic dev"];
    const PRIORITY = [
      {id:"quick",label:"Quickest to Money",sub:"Revenue in days/weeks"},
      {id:"revenue",label:"Highest Revenue",sub:"Long-term upside"},
      {id:"easy",label:"Easiest to Ship",sub:"AI tools, no-code"},
    ];
    const VAULT_TAGS = ["All","Top Pick","Researching","Building","Shelved"];
    const TAG_CLS = {"Top Pick":"bl","Researching":"bb","Building":"bg","Shelved":""};
    const PROJECT_SECTIONS = [
      {id:"spec",  icon:"📄",title:"Product Spec",       label:"Claude-ready system prompt for your app"},
      {id:"mvp",   icon:"🔨",title:"MVP Scope",           label:"What to build first (ruthlessly minimal)"},
      {id:"money", icon:"💳",title:"Monetization Setup",  label:"Stripe, landing page, first sale checklist"},
      {id:"launch",icon:"🚀",title:"Launch Plan",          label:"How to get your first 10 paying customers"},
      {id:"stack", icon:"🛠", title:"Recommended Stack",   label:"Exact tools for a solo vibe-coder"},
    ];

    // ── HELPERS ────────────────────────────────────────────────────────────────
    function parseIdeas(text) {
      const blocks = text.split(/\n(?=(?:#{1,3}|\*\*)?(?:Idea |App |\d+[\.\)])\s)/i).filter(b=>b.trim().length>40);
      if(blocks.length<2) return [{title:"App Concept",tagline:"",body:text,effort:"Low",revenue:"$1K–5K/mo",time:"2–4 weeks",id:Date.now()}];
      return blocks.slice(0,4).map(block=>{
        const lines=block.trim().split("\n").filter(Boolean);
        const titleLine=lines[0].replace(/^[#*\d\.\)]+\s*/,"").replace(/\*\*/g,"").trim();
        const [title,tagline=""] = titleLine.split("—").map(s=>s.trim());
        const body=lines.slice(1).join("\n").replace(/\*\*/g,"").trim();
        const effortM=body.match(/effort[:\s]+(\w+)/i);
        const revM=body.match(/\$([\d,KkMm\–\-]+\/mo[nth]*)/i);
        const timeM=body.match(/(\d+[-–]\d+\s*(?:days?|weeks?|months?))/i);
        return {id:Date.now()+Math.random(),title,tagline,body,
          effort:effortM?effortM[1]:"Low",
          revenue:revM?"$"+revM[1]:"Varies",
          time:timeM?timeM[1]:"2–4 wks"};
      });
    }

    function exportBrief(idea, extras={}) {
      let md=`# ${idea.title}\n> ${idea.tagline}\n\n**Time:** ${idea.time} · **Revenue:** ${idea.revenue} · **Effort:** ${idea.effort}\n\n---\n\n## Overview\n${idea.body}\n`;
      if(extras.validate) md+=`\n---\n\n## Validation\n${extras.validate}\n`;
      if(extras.roadmap)  md+=`\n---\n\n## Roadmap\n${extras.roadmap}\n`;
      if(extras.revenue)  md+=`\n---\n\n## Revenue Projections\n${extras.revenue}\n`;
      const blob=new Blob([md],{type:"text/markdown"});
      const a=document.createElement("a");

App: "${idea.title}"
Tagline: "${idea.tagline}"
Builder: solo, ${skill}, builds single-file HTML apps (like a self-contained index.html with React via CDN + Babel, no build step)

---
SYSTEM CONTEXT
[2 sentences: what this app does and who it's for]

TECH STACK — use exactly this:
- Single HTML file (React 18 via cdnjs CDN, Babel standalone, no npm, no build step)
- localStorage for data persistence
- Anthropic API via fetch for any AI features
- [any specific APIs or services needed]

UI STYLE
- Dark theme, #0d0d0d background
- [2-3 specific style directions that fit this app]
- Mobile-first, works on phone browser

V1 FEATURES — build these and nothing else:
1. [feature 1]
2. [feature 2]
3. [feature 3]
(max 3 — be ruthless)

DO NOT BUILD:
- [thing 1 to cut]
- [thing 2 to cut]

FIRST MESSAGE TO CLAUDE:
"Build me [app name]. [One sentence description]. Single HTML file, React via CDN, dark theme. Start with the full working V1. Here's the spec: [paste above]"
---

Make every line specific to "${idea.title}". No generic placeholder advice.`;

                        const isOpen=s?.open;
                        const hasContent=!!s?.content;
                        return (
                          <div key={sec.id} className="psec">
                            <div className="psec-hdr" onClick={()=>hasContent&&toggleSection(sec.id)}>
                              <div style={{display:"flex",alignItems:"center"}}>
                                <span className="psec-icon">{sec.icon}</span>
                                <span className="psec-title">{sec.title}</span>
                              </div>
                              {hasContent&&<span className={`psec-chevron ${isOpen?"open":""}`}>▼</span>}
                            </div>
                            {s?.loading&&<div className="psec-loading"><span className="dot">Generating {sec.title}</span></div>}
                            {hasContent&&isOpen&&(
                              <>
                                <div className="psec-body">{s.content}</div>
                                {sec.id==="spec"&&(
                                  <div style={{padding:".6rem 1.2rem",borderTop:"1px solid var(--b)",display:"flex",gap:".5rem",alignItems:"center",background:"rgba(0,0,0,.15)"}}>
                                    <button className="gen-btn-sm" onClick={()=>{
                                      navigator.clipboard.writeText(s.content).then(()=>{
                                        setProjSections(prev=>({...prev,spec:{...prev.spec,copied:true}}));
                                        setTimeout(()=>setProjSections(prev=>({...prev,spec:{...prev.spec,copied:false}})),2000);
                                      });
                                    }}>{projSections.spec?.copied?"✓ Copied!":"📋 Copy Prompt"}</button>
                                    <span style={{fontSize:".72rem",color:"var(--mut)"}}>Paste into a new Claude chat to start building</span>
                                  </div>
                                )}
                                {sec.id==="money"&&(()=>{
                                  const items=["Set up Stripe account","Create a product + price in Stripe","Get a Stripe payment link","Build a one-page landing page","Write the headline copy","Add payment link to landing page","Share with 5 potential users","Make first sale"];
                                  return (
                                    <div className="checklist">
                                      {items.map((item,i)=>{
                                        const key=`money-${i}`;
                                        return (
                                          <div key={i} className="check-item" onClick={()=>toggleCheck(key)}>
                                            <div className={`check-box ${projChecks[key]?"done":""}`}>{projChecks[key]?"✓":""}</div>
                                            <div className={`check-text ${projChecks[key]?"done":""}`}>{item}</div>
                                          </div>
                                        );
                                      })}
                                    </div>
                                  );
                                })()}
                              </>
                            )}
                            {!hasContent&&!s?.loading&&(
                              <div className="psec-gen">
                                <span className="psec-gen-text muted">{sec.label}</span>
                                <button className="gen-btn-sm" onClick={()=>genSection(sec.id)}>Generate →</button>
                              </div>
                            )}
                            {hasContent&&!isOpen&&(
                              <div className="psec-gen">
                                <span className="psec-gen-text muted">Generated — click to expand</span>
                                <button className="gen-btn-sm" onClick={()=>genSection(sec.id)}>Regenerate</button>
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </>
                }
              </div>
            )}

            {/* COMPARE MODAL */}
            {cmpResult&&(
              <div className="overlay" onClick={()=>setCmpResult(null)}>
                <div className="modal" onClick={e=>e.stopPropagation()}>
                  <div style={{fontFamily:"var(--mono)",fontSize:".6rem",color:"var(--mut)",textTransform:"uppercase",letterSpacing:".1em",marginBottom:".4rem"}}>Head-to-Head</div>
                  <h2>{cmpResult.a} vs {cmpResult.b}</h2>
                  <div className="sub">Which to build first</div>
                  {cmpLoading
                    ?<div className="loading-line"><span className="dot">Comparing</span></div>
                    :<div className="modal-body">{cmpResult.content}</div>}
                  <button className="modal-close" onClick={()=>setCmpResult(null)}>Close</button>
                </div>
              </div>
            )}
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<AppForge />);
  </script>
</body>
</html>
